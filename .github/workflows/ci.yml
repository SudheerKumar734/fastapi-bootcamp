# Workflow Name
name: CI/CD Pipeline

# Trigger workflow on push to main branch
on:
  push:
    branches:
      - main

jobs:

  # -----------------------------
  # CI JOB
  # -----------------------------
  build:

    # GitHub Hosted Runner
    runs-on: ubuntu-latest

    steps:

      # Checkout source code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Build and Push Docker Image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: sudheerkumar765996/titanic-api:latest


  # -----------------------------
  # CD JOB
  # -----------------------------
  deploy:

    # Deploy only if build succeeds
    needs: build

    # Self Hosted Runner (EC2)
    runs-on: self-hosted

    steps:

      - name: Pull Latest Docker Image
        run: sudo docker pull sudheerkumar765996/titanic-api:latest

      - name: Stop Existing Container
        run: sudo docker stop titanic-api || true

      - name: Remove Existing Container
        run: sudo docker rm titanic-api || true

      - name: Run New Container
        run: |
          sudo docker run -d --name titanic-api -p 8000:8000 sudheerkumar765996/titanic-api:latest