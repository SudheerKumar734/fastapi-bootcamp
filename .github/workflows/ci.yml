# Workflow display name (GitHub Actions page lo kanipisthundi)
name: CI Pipeline

# Eppudu workflow run avvali?
on:
  push:
    branches:
      - main

# Workflow lo cheyyalsina main task
jobs:
  build:

    # GitHub e operating system machine use cheyyali?
    runs-on: ubuntu-latest

    # Build job lo execute ayye commands
    steps:

      # Step 1: Repository code ni GitHub runner loki download chesthundi
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Docker Buildx setup
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 3: Docker Hub login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Step 4: Docker image build chesi Docker Hub ki push chesthundi
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: sudheerkumar765996/titanic-api:latest